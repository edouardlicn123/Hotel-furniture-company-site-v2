{# app/templates/partials/cart_scripts.html #}

<!-- html2canvas 用于截图（建议保留在这里，或移到 base.html 的 extra_scripts） -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
// ==================== 配置常量 ====================
const CART_KEY = 'inquiryCart';
const LAST_SEND_KEY = 'lastInquirySendTime';
const SEND_COOLDOWN = 120 * 1000; // 2 分钟冷却（毫秒）

let generatedCode = '';

// ==================== 工具函数 ====================
function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toastEl = document.createElement('div');
    toastEl.className = `toast align-items-center text-white bg-${type} border-0 shadow`;
    toastEl.innerHTML = `
        <div class="d-flex">
            <div class="toast-body fw-medium">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    `;
    container.appendChild(toastEl);
    const bsToast = new bootstrap.Toast(toastEl, { delay: 5000, autohide: true });
    bsToast.show();
    toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
}

function getCart() {
    try {
        const data = localStorage.getItem(CART_KEY);
        return data ? JSON.parse(data) : [];
    } catch (e) {
        console.error('Parse cart failed:', e);
        return [];
    }
}

function saveCart(items) {
    localStorage.setItem(CART_KEY, JSON.stringify(items));
}

function renderCart() {
    const items = getCart();
    const container = document.getElementById('cart-items');
    const emptyState = document.getElementById('empty-state');
    const sendBtn = document.getElementById('send-email-btn');

    container.innerHTML = '';

    if (items.length === 0) {
        emptyState.classList.remove('d-none');
        if (sendBtn) sendBtn.disabled = true;
        return;
    }

    emptyState.classList.add('d-none');
    if (sendBtn) sendBtn.disabled = false;

    items.forEach((item, index) => {
        const itemEl = document.createElement('div');
        itemEl.className = 'list-group-item list-group-item-action d-flex align-items-center py-3 px-4 rounded-3 mb-3 shadow-sm';
        itemEl.innerHTML = `
            <img src="${item.image || '/static/img/placeholder.jpg'}" 
                 alt="${item.name}" class="me-4 rounded" 
                 style="width:90px; height:90px; object-fit:cover; flex-shrink:0;">
            <div class="flex-grow-1">
                <h5 class="mb-1 fw-bold">${item.name}</h5>
                <p class="mb-1 text-muted small">Code: <strong>${item.code || 'N/A'}</strong></p>
            </div>
            <button class="btn btn-sm btn-outline-danger px-3" onclick="removeItem(${index})">
                <i class="fas fa-trash-alt"></i> Remove
            </button>
        `;
        container.appendChild(itemEl);
    });
}

function removeItem(index) {
    let items = getCart();
    items.splice(index, 1);
    saveCart(items);
    renderCart();
    showToast('Item removed from cart', 'info');
}

// ==================== 验证码生成与验证 ====================
function generateVerificationCode() {
    generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
    const canvas = document.getElementById('verification-canvas');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f8f9fa';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
        ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
        ctx.strokeStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.6)`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    const chars = generatedCode.split('');
    chars.forEach((char, i) => {
        ctx.font = 'bold 38px Arial';
        ctx.fillStyle = ['#1e88e5','#d81b60','#43a047','#fb8c00','#8e24aa'][i % 5];
        const x = 25 + i * 35;
        const y = 38;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate((Math.random() - 0.5) * 0.35);
        ctx.fillText(char, -12, 12);
        ctx.restore();
    });
}

function validateVerificationCode() {
    const input = document.getElementById('verification-input')?.value.trim();
    return input === generatedCode;
}

// ==================== 发送邮件询价（仅 official 模式） ====================
{% if settings.mode == 'official' %}
document.getElementById('send-email-btn')?.addEventListener('click', async () => {
    const name = document.getElementById('user-name')?.value.trim();
    const email = document.getElementById('user-email')?.value.trim();
    const whatsapp = document.getElementById('user-whatsapp')?.value.trim();
    const codeInput = document.getElementById('verification-input')?.value.trim();

    if (!name) {
        showToast('Please enter your name', 'danger');
        document.getElementById('user-name')?.focus();
        return;
    }

    if (!email) {
        showToast('Please enter your email address', 'danger');
        document.getElementById('user-email')?.focus();
        return;
    }

    if (!validateVerificationCode()) {
        showToast('Verification code incorrect', 'danger');
        generateVerificationCode();
        document.getElementById('verification-input').value = '';
        document.getElementById('verification-input').focus();
        return;
    }

    const items = getCart();
    if (items.length === 0) {
        showToast('Your cart is empty', 'warning');
        return;
    }

    const lastSend = localStorage.getItem(LAST_SEND_KEY);
    if (lastSend && (Date.now() - parseInt(lastSend) < SEND_COOLDOWN)) {
        const remaining = Math.ceil((SEND_COOLDOWN - (Date.now() - parseInt(lastSend))) / 60000);
        showToast(`Please wait ${remaining} more minute(s)`, 'warning');
        return;
    }

    const payload = {
        items: items,
        customer_name: name,
        customer_email: email,
        customer_whatsapp: whatsapp || null,
        message: ''
    };

    const btn = document.getElementById('send-email-btn');
    const spinner = btn.querySelector('.spinner-border');
    spinner.classList.remove('d-none');
    btn.disabled = true;
    btn.textContent = ' Sending...';

    try {
        const response = await fetch('/cart/send-inquiry', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
            showToast(result.message || 'Inquiry sent successfully!', 'success');
            localStorage.setItem(LAST_SEND_KEY, Date.now().toString());
        } else {
            showToast(result.message || 'Failed to send inquiry', 'danger');
        }
    } catch (err) {
        console.error('Send inquiry failed:', err);
        showToast('Network error, please try again', 'danger');
    } finally {
        spinner.classList.add('d-none');
        btn.disabled = false;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm d-none me-2" role="status"></span> Send Email Inquiry';
    }
});
{% endif %}

// ==================== 其他事件绑定 ====================
document.getElementById('refresh-verification')?.addEventListener('click', () => {
    generateVerificationCode();
    document.getElementById('verification-input').value = '';
    showToast('Verification code refreshed', 'info');
});

document.getElementById('screenshot-btn')?.addEventListener('click', () => {
    html2canvas(document.getElementById('cart-items'), {
        scale: 2,
        useCORS: true,
        backgroundColor: null,
        logging: false
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `Hotel_Inquiry_Cart_${new Date().toISOString().slice(0,10)}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('Screenshot downloaded successfully', 'success');
    }).catch(err => {
        console.error('Screenshot failed:', err);
        showToast('Failed to generate screenshot', 'danger');
    });
});

document.getElementById('export-csv-btn')?.addEventListener('click', () => {
    showToast('CSV export feature coming soon', 'info');
});

document.getElementById('reset-btn')?.addEventListener('click', () => {
    if (confirm('Clear all items in the cart? This cannot be undone.')) {
        localStorage.removeItem(CART_KEY);
        renderCart();
        showToast('Cart has been cleared', 'info');
    }
});

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => {
    renderCart();
    {% if settings.mode == 'official' %}
    generateVerificationCode();
    {% endif %}
});
</script>
