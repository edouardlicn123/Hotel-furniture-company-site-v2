<section class="hero-section hero-large" id="page-hero"
         style="background-image: url('{{ hero_background | default(url_for('static', filename='img/hero-default-large.jpg')) }}');">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1 class="display-4 fw-bold">{{ hero_title }}</h1>
        <p class="lead">{{ hero_subtitle }}</p>
        <div class="mt-4">
            {% if hero_buttons %}
                {{ hero_buttons | safe }}
            {% else %}
                <a href="/products" class="btn btn-primary me-3">查看产品</a>
                <a href="/contact" class="btn btn-outline-dark">联系我们</a>
            {% endif %}
        </div>
    </div>
</section>
