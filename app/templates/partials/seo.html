{# app/templates/partials/seo.html - 全站统一 SEO 模板（最新完整版，包含 OG 图片支持） #}

<title>{{ page_title }}</title>

<meta name="description" content="{{ page_description }}">
<meta name="keywords" content="{{ page_keywords }}">

<link rel="canonical" href="{{ request.url }}">

<!-- Open Graph / Facebook -->
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page_description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.url }}">
<meta property="og:site_name" content="{{ company_name }}">

{# OG 图片支持 - 优先使用页面注入的 page_og_image（如系列详情页主图），其次降级使用公司 Logo #}
{% if page_og_image %}
<meta property="og:image" content="{{ page_og_image }}">
<meta property="og:image:alt" content="{{ page_title }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/jpeg">
{% elif company_logo_url %}
<meta property="og:image" content="{{ company_logo_url }}?w=1200&h=630">
<meta property="og:image:alt" content="{{ company_name }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
{% endif %}

<!-- Twitter Card（可选，推荐保留） -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page_title }}">
<meta name="twitter:description" content="{{ page_description }}">
{% if page_og_image %}
<meta name="twitter:image" content="{{ page_og_image }}">
{% elif company_logo_url %}
<meta name="twitter:image" content="{{ company_logo_url }}?w=1200&h=630">
{% endif %}
